name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
      - name: Audit headline theorem axioms
        run: scripts/check.sh --no-build
